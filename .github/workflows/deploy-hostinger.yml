name: Deploy Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script_stop: true
          script: |
            set -e
            APP_DIR="$HOME/domains/ptnurmadanifarma.com/public_html"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            php -d disable_functions= /usr/local/bin/composer2 install --no-dev --optimize-autoloader --no-interaction --no-scripts
            php -d disable_functions= /usr/local/bin/composer2 dump-autoload -o --no-interaction
            rm -f bootstrap/cache/packages.php bootstrap/cache/services.php bootstrap/cache/config.php
            rm -f bootstrap/cache/routes-v7.php bootstrap/cache/routes.php
            php artisan package:discover --ansi || true
            mkdir -p storage/framework/{cache,sessions,views} storage/logs bootstrap/cache storage/app/public
            if [ ! -L public/storage ]; then
              rm -rf public/storage
              ln -s ../storage/app/public public/storage
            fi
            if [ ! -f .env ]; then
              echo "Missing .env on server"
              exit 1
            fi
            if [ ! -f .htaccess ]; then
              echo "Missing root .htaccess"
              exit 1
            fi
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo DEPLOY_OK

      - name: Upload Vite build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "public/build"
          target: "/home/u333150370/domains/ptnurmadanifarma.com/public_html/public"
          overwrite: true
